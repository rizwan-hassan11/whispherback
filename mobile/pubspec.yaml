name: whisperback
description: WhisperBack - Your Personalized Audio Whisperer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  adhan: ^2.0.0+1
  geolocator: ^13.0.2
  file_picker: ^8.1.6
  record: ^5.2.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  equatable: ^2.0.7
  collection: ^1.19.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_lucide: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/

name: whisperback
description: WhisperBack - Your Personalized Audio Whisperer
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  audio_session: ^0.1.21
  adhan: ^2.0.0+1
  geolocator: ^13.0.2
  file_picker: ^8.1.6
  record: ^5.2.0
  permission_handler: ^11.3.1
  flutter_local_notifications: ^18.0.1
  # Round 20: 4.0.8 is the last release before the Kotlin 2.2 / AGP
  # 8.12.1 bump. Our project is on AGP 8.11.1 (matching the rest of
  # the plugin tree) so this version is the safe choice. The 5.x
  # line is also Kotlin DSL only, which our Groovy build files
  # would need migrating to.
  android_alarm_manager_plus: ^4.0.8
  timezone: ^0.10.0
  flutter_timezone: ^4.1.0
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  equatable: ^2.0.7
  collection: ^1.19.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  flutter_lucide: ^1.11.0
  sqflite_common_ffi: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  fake_async: ^1.3.1

dependency_overrides:
  # record 5.x pulls record_linux 0.7.x which breaks Windows/desktop builds
  record_linux: ^1.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
    - assets/audio/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/app_logo.png"
  adaptive_icon_background: "#020611"
  adaptive_icon_foreground: "assets/branding/app_logo.png"
  min_sdk_android: 24
  remove_alpha_ios: true

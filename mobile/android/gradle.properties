org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Round 20: disable Kotlin incremental compilation. The
# android_alarm_manager_plus 4.0.8 plugin ships Kotlin sources on the
# C:\ pub cache while our build output lives on D:\, which trips the
# Kotlin incremental cache's `RelocatableFileToPathConverter` cross-
# drive assertion on Windows (`this and base files have different
# roots`). The build still completes via fallback to non-incremental,
# but the daemon error eats 10+ minutes of build time. Disabling
# incremental for Kotlin sidesteps the trap entirely.
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
